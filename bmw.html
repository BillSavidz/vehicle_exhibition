<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMW Showroom</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.png" />

    <meta name="theme-color" content="#1e3a8a" />
  </head>

  <body>
    <div id="header-placeholder"></div>

    <main class="vehicle-grid">
      <div class="search-row">
        <input type="text" id="search-box" placeholder="Search vehicles..." />

        <button id="sort-btn" title="Sort by Price">
          <img id="sort-icon" src="images/icons/sort.svg" alt="Sort" />
        </button>
        <button id="filter-btn" title="Price Filter">
          <img src="images/icons/filter.svg" alt="Filter" />
        </button>
      </div>

      <div id="price-filter-row" class="price-filter-row hidden">
        <div class="price-input-wrapper">
          <span class="currency-label">GHS</span>
          <input
            type="text"
            id="min-price"
            inputmode="numeric"
            placeholder="Min"
          />
        </div>

        <div class="price-input-wrapper">
          <span class="currency-label">GHS</span>
          <input
            type="text"
            id="max-price"
            inputmode="numeric"
            placeholder="Max"
          />
        </div>

        <button id="clear-filters" title="Clear Filters">✕</button>
      </div>

      <p class="tax-note">Tap to make enquiries.</p>
      <div id="results-count" class="results-count">Showing 0 vehicles</div>

      <div id="vehicles-container"></div>

      <p class="tax-note">All prices include fees/port charges.</p>
    </main>

    <!-- VEHICLE DETAILS MODAL -->
    <div id="vehicle-modal" class="modal">
      <div class="modal-content vehicle-modal-content">
        <span class="close-btn" onclick="closeVehicleModal()"> &times; </span>

        <img
          id="modal-image"
          class="modal-vehicle-image"
          src=""
          alt="Vehicle"
        />

        <h2 id="modal-title"></h2>

        <div id="modal-class" class="vehicle-class"></div>

        <div class="starting-price">Starting From</div>

        <div id="modal-price" class="starting-price-value"></div>

        <p id="modal-specs"></p>

        <div class="modal-actions">
          <a id="modal-video" class="cta-btn enquire-btn" target="_blank">
            Watch Video
          </a>
        </div>

        <div class="cta-buttons">
          <button id="modal-enquire" class="cta-btn enquire-btn">
            Enquire
          </button>

          <a id="modal-whatsapp" class="cta-btn whatsapp-btn" target="_blank">
            <img
              src="images/icons/whatsapp.png"
              class="whatsapp-icon"
              alt="WhatsApp"
            />

            <span>Leave a Message</span>
          </a>
        </div>
      </div>
    </div>

    <!-- ENQUIRY MODAL -->
    <div id="enquiry-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeEnquiry()"> &times; </span>

        <h2>Vehicle Enquiry</h2>

        <form id="enquiry-form">
          <input type="text" id="vehicle-name" readonly />

          <input
            type="text"
            id="customer-name"
            placeholder="Your Name"
            required
          />

          <input
            type="tel"
            id="customer-phone"
            placeholder="Phone Number"
            required
          />

          <input type="email" id="customer-email" placeholder="Email Address" />

          <input
            type="number"
            id="customer-budget"
            placeholder="Budget (GHS)"
            min="0"
            step="0.01"
            required
          />

          <button type="submit">Submit Enquiry</button>
        </form>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="script.js"></script>
  </body>
</html>
