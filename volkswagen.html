<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volkswagen Showroom</title>

    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.png" />

    <meta name="theme-color" content="#1e3a8a" />
  </head>

  <body>
    <div id="header-placeholder"></div>

    <main class="vehicle-grid">
      <p class="tax-note">Tap on models for a video preview.</p>

      <div id="vehicles-container"></div>

      <p class="tax-note">All prices include fees/port charges.</p>
    </main>

    <!-- ENQUIRY MODAL -->
    <div id="enquiry-modal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeEnquiry()"> &times; </span>

        <h2>Vehicle Enquiry</h2>

        <form id="enquiry-form">
          <input type="text" id="vehicle-name" readonly />

          <input
            type="text"
            id="customer-name"
            placeholder="Your Name"
            required
          />

          <input
            type="tel"
            id="customer-phone"
            placeholder="Phone Number"
            required
          />

          <input type="email" id="customer-email" placeholder="Email Address" />

          <input
            type="number"
            id="customer-budget"
            placeholder="Budget (GHS)"
            min="0"
            step="0.01"
            required
          />

          <button type="submit">Submit Enquiry</button>
        </form>
      </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="layout.js"></script>
    <script src="script.js"></script>
  </body>
</html>
